version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moravo-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      # O DATABASE_URL e o JWT_SECRET podem ser passados como variáveis de ambiente no Portainer
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 168
    volumes:
      - uploads_data:/app/uploads

volumes:
  uploads_data:
